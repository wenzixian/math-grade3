<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>三年级数学乐园</title>
<style>
:root {
  --pink: #FF6B9D; --orange: #FF9A56; --yellow: #FFD93D; --green: #6BCB77;
  --blue: #4D96FF; --purple: #C77DFF; --bg: #FFF5F9; --card: #FFFFFF;
  --text: #4A3048; --light-text: #8B7D87; --radius: 20px;
  --font: 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
}
* { margin:0;padding:0;box-sizing:border-box; }
body {
  font-family:var(--font); color:var(--text);
  background:linear-gradient(135deg,#FFF5F9 0%,#F0E6FF 30%,#E6F0FF 60%,#FFF9F0 100%);
  background-attachment:fixed; min-height:100vh; min-height:100dvh;
  -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;
}
.container { max-width:600px; margin:0 auto; padding:12px 16px 30px; }
/* 登录页 */
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#FFF5F9 0%,#F0E6FF 40%,#E6F0FF 70%,#FFF9F0 100%);display:flex;align-items:center;justify-content:center;z-index:10000;flex-direction:column;}
.login-card{background:#fff;border-radius:24px;padding:36px 28px;text-align:center;box-shadow:0 8px 40px rgba(199,125,255,0.2);border:3px solid #F8E8FF;max-width:380px;width:90%;animation:bounceIn 0.6s cubic-bezier(0.68,-0.55,0.265,1.55);}
.login-icon{font-size:64px;margin-bottom:8px;}
.login-card h2{font-size:24px;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--light-text);margin-bottom:20px;}
.login-card input{width:100%;height:52px;font-size:20px;text-align:center;border:3px solid #E8D5E0;border-radius:14px;outline:none;background:#FFFAFD;color:var(--text);font-weight:700;font-family:var(--font);margin-bottom:12px;}
.login-card input:focus{border-color:var(--pink);box-shadow:0 0 0 4px rgba(255,107,157,0.12);}
.login-hint{font-size:12px;color:var(--light-text);margin-bottom:16px;line-height:1.6;}
.login-status{font-size:13px;color:var(--green);min-height:20px;margin-bottom:8px;}
/* Header */
.header{text-align:center;padding:16px 0 8px;}
.header h1{font-size:26px;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px;letter-spacing:2px;}
.user-bar{display:flex;align-items:center;justify-content:center;gap:12px;font-size:14px;color:var(--light-text);margin-top:2px;flex-wrap:wrap;}
.user-name{font-weight:700;color:var(--purple);}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite;}
.btn-sm{font-size:12px;padding:6px 14px;border-radius:20px;border:2px solid #E8D5E0;background:#fff;color:var(--text);cursor:pointer;font-family:var(--font);font-weight:600;-webkit-appearance:none;}
.btn-sm:active{background:#F5F0F8;}
/* Nav */
.nav{display:flex;gap:8px;margin-bottom:16px;position:sticky;top:8px;z-index:100;flex-wrap:wrap;}
.nav-btn{flex:1;min-width:70px;padding:13px 6px;border:none;border-radius:16px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.25s;color:#fff;letter-spacing:0.5px;box-shadow:0 3px 10px rgba(0,0,0,0.1);-webkit-appearance:none;}
.nav-btn:active{transform:scale(0.95);}
.nav-btn.n1{background:linear-gradient(135deg,var(--pink),#FF4081);}
.nav-btn.n2{background:linear-gradient(135deg,var(--blue),#448AFF);}
.nav-btn.n3{background:linear-gradient(135deg,var(--purple),#B388FF);}
.nav-btn.active{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.18);}
.nav-btn:not(.active){opacity:0.7;transform:scale(0.94);}
/* Sections */
.section{display:none;}.section.active{display:block;}
.card{background:var(--card);border-radius:var(--radius);padding:20px 18px;margin-bottom:14px;box-shadow:0 4px 15px rgba(255,107,157,0.12);border:2px solid #FFF0F5;}
.big-number{font-size:46px;font-weight:800;text-align:center;color:var(--pink);letter-spacing:4px;line-height:1.3;}
.operator{font-size:34px;color:var(--purple);font-weight:700;}
.question-row{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;padding:10px 0;}
.answer-input{width:120px;height:56px;font-size:28px;text-align:center;border:3px solid #E8D5E0;border-radius:14px;outline:none;background:#FFFAFD;color:var(--text);font-weight:700;font-family:var(--font);-webkit-appearance:none;}
.answer-input:focus{border-color:var(--pink);box-shadow:0 0 0 4px rgba(255,107,157,0.15);}
.btn{display:inline-block;padding:14px 32px;border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:var(--font);letter-spacing:1px;color:#fff;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(0.94);}
.btn-pink{background:linear-gradient(135deg,var(--pink),#FF4081);box-shadow:0 4px 12px rgba(255,107,157,0.35);}
.btn-blue{background:linear-gradient(135deg,var(--blue),#448AFF);box-shadow:0 4px 12px rgba(77,150,255,0.35);}
.btn-green{background:linear-gradient(135deg,var(--green),#43A047);box-shadow:0 4px 12px rgba(107,203,119,0.35);}
.btn-purple{background:linear-gradient(135deg,var(--purple),#B388FF);box-shadow:0 4px 12px rgba(199,125,255,0.35);}
.btn-orange{background:linear-gradient(135deg,var(--orange),#FF7043);box-shadow:0 4px 16px rgba(255,154,86,0.35);}
.btn-block{display:block;width:100%;text-align:center;}
.feedback{text-align:center;padding:12px;font-size:22px;font-weight:700;min-height:48px;transition:all 0.3s;}
.feedback.correct{color:var(--green);}.feedback.wrong{color:var(--pink);}
.progress-bar{height:10px;background:#F0E0E8;border-radius:5px;margin:12px 0;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:5px;transition:width 0.4s ease;}
.score-display{display:flex;justify-content:space-around;text-align:center;padding:8px 0;}
.score-item .value{font-size:32px;font-weight:800;color:var(--pink);}
.score-item .label{font-size:12px;color:var(--light-text);}
.option-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.option-btn{padding:16px 12px;border:3px solid #E8D5E0;border-radius:14px;background:#FFFAFD;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:var(--font);color:var(--text);text-align:center;-webkit-appearance:none;word-break:break-all;}
.option-btn:active{transform:scale(0.95);}
.option-btn.correct-choice{border-color:var(--green);background:#E8F5E9;animation:pulse 0.5s;}
.option-btn.wrong-choice{border-color:var(--pink);background:#FCE4EC;animation:shake 0.4s;}
.option-btn:disabled{pointer-events:none;}
.solution-box{background:#F3E5F5;border-radius:12px;padding:12px 16px;margin-top:10px;font-size:14px;line-height:1.7;color:#6A1B9A;display:none;white-space:pre-line;}
.solution-box.show{display:block;}
.canvas-wrap{position:relative;width:100%;max-width:360px;margin:0 auto;}
.canvas-wrap canvas{display:block;width:100%;border-radius:16px;background:#FFFAFD;border:2px solid #F0E0E8;}
/* 积分榜 */
.lb-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;position:sticky;top:0;background:#fff;z-index:1;padding-bottom:8px;}
.leaderboard-table{width:100%;border-collapse:collapse;font-size:14px;}
.leaderboard-table th{background:linear-gradient(135deg,var(--orange),#FF7043);color:#fff;padding:12px 6px;font-size:13px;font-weight:700;}
.leaderboard-table th:first-child{border-radius:12px 0 0 0;}
.leaderboard-table th:last-child{border-radius:0 12px 0 0;}
.leaderboard-table td{padding:10px 6px;text-align:center;border-bottom:1px solid #F5E8F0;font-weight:600;}
.leaderboard-table .rank-col{font-weight:800;font-size:16px;width:40px;}
.leaderboard-table .name-col{text-align:left;padding-left:8px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.leaderboard-table .highlight-row{background:#FFF3E0!important;}
.leaderboard-table .total-col{color:var(--pink);font-weight:800;font-size:16px;}
.lb-empty{text-align:center;padding:40px 20px;color:var(--light-text);font-size:15px;}
.my-rank-card{background:linear-gradient(135deg,#FFF8E1,#FFF3E0);border:2px solid var(--orange);border-radius:16px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-around;text-align:center;flex-wrap:wrap;gap:8px;}
.my-rank-card .my-val{font-size:24px;font-weight:800;color:var(--orange);}
.my-rank-card .my-lbl{font-size:11px;color:var(--light-text);}
/* 动画 */
.celebration{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;}
.star{position:absolute;font-size:30px;animation:starFall 1.2s ease-out forwards;pointer-events:none;}
@keyframes starFall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1);}100%{opacity:0;transform:translateY(400px) rotate(360deg) scale(0.2);}}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
.bounce-in{animation:bounceIn 0.5s cubic-bezier(0.68,-0.55,0.265,1.55);}
@keyframes bounceIn{0%{transform:scale(0.3);opacity:0;}50%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;}}
.timer{font-size:18px;font-weight:700;color:var(--orange);text-align:center;}
.timer.warning{color:var(--pink);animation:pulse 0.5s infinite;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;font-weight:600;z-index:10001;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
@media(max-width:400px){
  .header h1{font-size:22px;}.nav-btn{font-size:12px;padding:11px 3px;border-radius:12px;}
  .big-number{font-size:36px;}.answer-input{width:100px;height:48px;font-size:24px;}
  .option-btn{font-size:14px;padding:13px 6px;}
  .leaderboard-table th,.leaderboard-table td{font-size:11px;padding:8px 3px;}
}
</style>
</head>
<body>

<!-- ═════ 登录页 ═════ -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <div class="login-icon">🦊</div>
    <h2>欢迎来到数学乐园</h2>
    <div class="login-sub">三年级下册 · 人教版 · 云端联网</div>
    <input type="text" id="login-name-input" placeholder="请输入你的名字" maxlength="10" autocomplete="off" inputmode="text">
    <div class="login-hint">输入姓名开始挑战<br>全班53人积分实时同步 🌐</div>
    <div class="login-status" id="login-status"></div>
    <button class="btn btn-orange btn-block" onclick="doLogin()" id="login-btn">🚀 进入数学乐园</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ═════ 主界面 ═════ -->
<div class="container" id="main-app" style="display:none;">
  <div class="header">
    <h1>🌟 数学乐园 🌟</h1>
    <div class="user-bar">
      <span>👤 <span class="user-name" id="display-name">--</span></span>
      <span class="online-dot" id="online-dot" title="已联网"></span>
      <button class="btn-sm" onclick="showLeaderboard()">🏆 积分榜</button>
      <button class="btn-sm" onclick="doLogout()">🔄 换人</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn n1 active" onclick="switchTab('mental')" id="nav-mental">🧮 口算</button>
    <button class="nav-btn n2" onclick="switchTab('word')" id="nav-word">📝 应用</button>
    <button class="nav-btn n3" onclick="switchTab('geo')" id="nav-geo">🔷 几何</button>
  </div>

  <!-- ═══ 口算大冒险 ═══ -->
  <div class="section active" id="section-mental">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-weight:700;color:var(--pink);font-size:15px;">第 <span id="mq-round">1</span> / 10 题</div>
        <div class="timer" id="m-timer">⏱ 0s</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="m-progress" style="width:0%"></div></div>
      <div class="question-row">
        <span class="big-number" id="m-left">72</span>
        <span class="operator" id="m-op">÷</span>
        <span class="big-number" id="m-right">8</span>
        <span class="operator">=</span>
        <span style="font-size:36px;">?</span>
      </div>
      <div style="text-align:center;margin:12px 0;">
        <input type="number" class="answer-input" id="m-answer" placeholder="?" autocomplete="off" inputmode="numeric">
      </div>
      <div style="text-align:center;"><button class="btn btn-pink" onclick="checkMental()" id="m-submit-btn">✅ 确认答案</button></div>
      <div class="feedback" id="m-feedback"></div>
    </div>
    <div class="card" id="m-result-card" style="display:none;text-align:center;">
      <div style="font-size:60px;" id="m-result-emoji">🎉</div>
      <div style="font-size:22px;font-weight:700;margin:8px 0;" id="m-result-text">太棒了！</div>
      <div class="score-display">
        <div class="score-item"><div class="value" id="m-score">8</div><div class="label">✅ 答对</div></div>
        <div class="score-item"><div class="value" id="m-time">24s</div><div class="label">⏱ 用时</div></div>
        <div class="score-item"><div class="value" id="m-accuracy">80%</div><div class="label">📊 正确率</div></div>
      </div>
      <div style="font-size:13px;color:var(--light-text);margin-top:6px;" id="m-best-hint"></div>
      <button class="btn btn-orange btn-block" onclick="startMental()" style="margin-top:12px;">🔄 再来一轮</button>
    </div>
  </div>

  <!-- ═══ 应用题闯关 ═══ -->
  <div class="section" id="section-word">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-weight:700;color:var(--blue);font-size:14px;">📝 应用题闯关</div>
        <div style="font-weight:700;color:var(--green);">正确：<span id="w-correct-count">0</span> 题</div>
      </div>
      <div style="background:#F0F4FF;border-radius:14px;padding:16px;margin:8px 0;font-size:16px;line-height:1.8;min-height:80px;" id="w-problem-text">点击"开始答题"吧！</div>
      <div class="option-grid" id="w-options">
        <button class="option-btn" disabled>A</button><button class="option-btn" disabled>B</button>
        <button class="option-btn" disabled>C</button><button class="option-btn" disabled>D</button>
      </div>
      <div class="solution-box" id="w-solution"></div>
      <div class="feedback" id="w-feedback"></div>
      <div style="text-align:center;margin-top:10px;"><button class="btn btn-blue" onclick="nextWordProblem()" id="w-next-btn">🚀 开始答题</button></div>
    </div>
  </div>

  <!-- ═══ 几何魔法屋 ═══ -->
  <div class="section" id="section-geo">
    <div class="card">
      <div style="text-align:center;font-weight:700;color:var(--purple);font-size:15px;margin-bottom:8px;">🔷 几何魔法屋</div>
      <div class="canvas-wrap"><canvas id="geo-canvas" width="360" height="240"></canvas></div>
      <div style="text-align:center;font-size:16px;font-weight:700;margin:10px 0;min-height:28px;" id="geo-question-text">请看图回答问题</div>
      <div class="option-grid" id="geo-options">
        <button class="option-btn" disabled>A</button><button class="option-btn" disabled>B</button>
        <button class="option-btn" disabled>C</button><button class="option-btn" disabled>D</button>
      </div>
      <div class="solution-box" id="geo-solution"></div>
      <div class="feedback" id="geo-feedback"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
        <span style="font-weight:700;color:var(--green);">正确：<span id="g-correct-count">0</span></span>
        <button class="btn btn-purple" onclick="nextGeoProblem()" id="geo-next-btn">✨ 出题</button>
      </div>
    </div>
  </div>
</div>

<div class="celebration" id="celebration"></div>

<script>
// ==================== 云端数据库配置 ====================
// 使用 jsonblob.com 免费 JSON 存储（无需注册，开箱即用）
const DB_URL = 'https://jsonblob.com/api/jsonBlob/019e006e-2b2d-7917-bdf1-50243d5167c1';
let dbCache = null;        // 缓存的数据库
let dbLastFetch = 0;       // 上次获取时间
const DB_CACHE_MS = 3000;  // 缓存有效期3秒

// ==================== 全局状态 ====================
let studentName = '';
let currentTab = 'mental';

// ==================== Toast ====================
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);
}

// ==================== 登录 ====================
function doLogin(){
  const input=document.getElementById('login-name-input');
  const name=input.value.trim();
  if(!name){input.style.borderColor='#FF6B9D';input.focus();input.placeholder='请先输入名字哦～';setTimeout(()=>input.style.borderColor='#E8D5E0',1000);return;}
  studentName=name;
  const statusEl=document.getElementById('login-status');
  const btnEl=document.getElementById('login-btn');
  statusEl.textContent='⏳ 正在连接云端...';btnEl.disabled=true;

  // 测试云端连接
  fetch(DB_URL).then(r=>r.json()).then(()=>{
    statusEl.textContent='✅ 云端连接成功！';
  }).catch(()=>{
    statusEl.textContent='⚠️ 云端暂不可用，使用本地模式';
  }).finally(()=>{
    btnEl.disabled=false;
    finishLogin(name);
  });
}

function finishLogin(name){
  localStorage.setItem('math_student_name',name);
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('display-name').textContent=name;
  initApp();
}

function doLogout(){
  if(confirm('确定要换人吗？积分不会丢失哦～')){
    localStorage.removeItem('math_student_name');studentName='';
    document.getElementById('login-overlay').style.display='flex';
    document.getElementById('main-app').style.display='none';
    document.getElementById('login-name-input').value='';
    document.getElementById('login-name-input').focus();
    document.getElementById('login-status').textContent='';
  }
}

// ==================== 云端读写 ====================
async function fetchDB(){
  const now=Date.now();
  if(dbCache && (now-dbLastFetch)<DB_CACHE_MS) return dbCache;
  try{
    const res=await fetch(DB_URL);
    dbCache=await res.json();
    dbLastFetch=now;
    if(!dbCache.students) dbCache.students={};
    return dbCache;
  }catch(e){return {students:{}};}
}

async function saveScoreToCloud(type,value){
  if(!studentName) return;
  try{
    // 先获取最新数据
    const db=await fetch(DB_URL).then(r=>r.json());
    if(!db.students) db.students={};
    if(!db.students[studentName]) db.students[studentName]={mental_best:0,word_correct:0,geo_correct:0};
    if(value>db.students[studentName][type]){
      db.students[studentName][type]=value;
      await fetch(DB_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(db)});
      dbCache=db;dbLastFetch=Date.now();
    }
  }catch(e){console.warn('云端同步失败:',e);}
}

async function loadAllScores(){
  try{
    const db=await fetchDB();
    const list=[];
    for(const[name,data]of Object.entries(db.students||{})){
      const mb=data.mental_best||0, wc=data.word_correct||0, gc=data.geo_correct||0;
      list.push({name,mental_best:mb,word_correct:wc,geo_correct:gc,total:mb+wc+gc});
    }
    list.sort((a,b)=>b.total-a.total);
    list.forEach((e,i)=>e.rank=i+1);
    return list;
  }catch(e){return [];}
}

// 本地兜底
function getLocal(k){return studentName?parseInt(localStorage.getItem('math_'+k+'_'+studentName)||'0'):0;}
function saveLocal(k,v){
  if(!studentName)return;
  const full='math_'+k+'_'+studentName;
  const prev=parseInt(localStorage.getItem(full)||'0');
  if(v>prev){localStorage.setItem(full,v);saveScoreToCloud(k,v);}
}

// ==================== 庆祝动画 ====================
function spawn(emoji,count){
  const c=document.getElementById('celebration');
  for(let i=0;i<count;i++){
    const el=document.createElement('span');el.className='star';el.textContent=emoji;
    el.style.left=Math.random()*90+5+'%';el.style.top=-(Math.random()*60+10)+'px';
    el.style.animationDuration=(Math.random()*1+1)+'s';
    el.style.animationDelay=Math.random()*0.3+'s';
    el.style.fontSize=(Math.random()*20+22)+'px';

// ==================== 口算大冒险 ====================
let mState={questions:[],currentIndex:0,correct:0,startTime:0,timerInterval:null,answered:false,roundActive:false};

function genQ(){
  const qs=[];
  const types=[
    ()=>{const d=[2,3,4,5,6,7,8,9][Math.random()*8|0],q=Math.random()*8+2|0;return{left:d*q,op:'÷',right:d,answer:q};},
    ()=>{const d=[2,3,4,5][Math.random()*4|0],b=Math.random()*9+1|0,s=[10,100][Math.random()*2|0];return{left:b*d*s,op:'÷',right:d,answer:b*s};},
    ()=>{const a=Math.random()*90+10|0,b=[10,20,30,40,50][Math.random()*5|0];return{left:a,op:'×',right:b,answer:a*b};},
    ()=>{const a=(Math.random()*9+1|0)*10,b=(Math.random()*9+1|0)*10;return{left:a,op:'×',right:b,answer:a*b};},
    ()=>{const a=(Math.random()*90+10)/10,b=(Math.random()*50+1)/10;return{left:a.toFixed(1),op:'+',right:b.toFixed(1),answer:+(a+b).toFixed(1)};},
    ()=>{let a=(Math.random()*90+20)/10,b=(Math.random()*(a*10-1)+1)/10;return{left:a.toFixed(1),op:'−',right:b.toFixed(1),answer:+(a-b).toFixed(1)};},
  ];
  const idxs=[0,1,2,3,4,5];for(let i=6;i<10;i++)idxs.push(Math.random()*6|0);
  for(let i=idxs.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[idxs[i],idxs[j]]=[idxs[j],idxs[i]];}
  for(let i=0;i<10;i++)qs.push(types[idxs[i]]());return qs;
}

function startMental(){
  if(mState.timerInterval)clearInterval(mState.timerInterval);
  mState={questions:genQ(),currentIndex:0,correct:0,startTime:Date.now(),timerInterval:null,answered:false,roundActive:true};
  window._mentalInit=true;
  document.getElementById('m-result-card').style.display='none';
  document.getElementById('m-feedback').textContent='';document.getElementById('m-feedback').className='feedback';
  document.getElementById('m-submit-btn').disabled=false;document.getElementById('m-answer').disabled=false;
  document.getElementById('m-answer').value='';document.getElementById('m-best-hint').textContent='';
  setTimeout(()=>document.getElementById('m-answer').focus(),100);
  mState.timerInterval=setInterval(()=>{
    if(!mState.roundActive)return;const t=Math.floor((Date.now()-mState.startTime)/1000);
    const el=document.getElementById('m-timer');el.textContent='⏱ '+t+'s';el.classList.toggle('warning',t>60);
  },1000);
  showMQ();
}

function showMQ(){
  const q=mState.questions[mState.currentIndex];
  document.getElementById('m-left').textContent=q.left;
  document.getElementById('m-op').textContent=q.op;
  document.getElementById('m-right').textContent=q.right;
  document.getElementById('mq-round').textContent=mState.currentIndex+1;
  document.getElementById('m-progress').style.width=(mState.currentIndex*10)+'%';
  document.getElementById('m-feedback').textContent='';document.getElementById('m-feedback').className='feedback';
  document.getElementById('m-answer').value='';
  document.getElementById('m-answer').disabled=false;document.getElementById('m-submit-btn').disabled=false;
  mState.answered=false;setTimeout(()=>document.getElementById('m-answer').focus(),50);
}

function checkMental(){
  if(!mState.roundActive||mState.answered)return;
  const input=document.getElementById('m-answer').value.trim();if(input==='')return;
  const ua=parseFloat(input);
  if(isNaN(ua)){document.getElementById('m-feedback').textContent='请输入数字哦～';document.getElementById('m-feedback').className='feedback wrong';return;}
  const q=mState.questions[mState.currentIndex];const ok=ua===q.answer;mState.answered=true;
  document.getElementById('m-answer').disabled=true;document.getElementById('m-submit-btn').disabled=true;
  const fb=document.getElementById('m-feedback');
  if(ok){mState.correct++;fb.textContent='✅ 太棒了！答对啦！';fb.className='feedback correct bounce-in';starBurst();}
  else{fb.textContent='❌ 不对哦～答案是 '+q.answer+'，加油！';fb.className='feedback wrong bounce-in';cheerBurst();}
  document.getElementById('m-progress').style.width=((mState.currentIndex+1)*10)+'%';
  setTimeout(()=>{mState.currentIndex++;if(mState.currentIndex>=10)finishMR();else showMQ();},1200);
}

function finishMR(){
  mState.roundActive=false;if(mState.timerInterval)clearInterval(mState.timerInterval);
  const elapsed=Math.floor((Date.now()-mState.startTime)/1000);
  document.getElementById('m-score').textContent=mState.correct;
  document.getElementById('m-time').textContent=elapsed+'s';
  document.getElementById('m-accuracy').textContent=Math.round(mState.correct/10*100)+'%';
  document.getElementById('m-feedback').textContent='';document.getElementById('m-feedback').className='feedback';
  document.getElementById('m-answer').disabled=true;document.getElementById('m-submit-btn').disabled=true;
  document.getElementById('m-progress').style.width='100%';document.getElementById('m-timer').classList.remove('warning');
  document.getElementById('m-result-card').style.display='block';
  const emoji=document.getElementById('m-result-emoji'),text=document.getElementById('m-result-text');
  if(mState.correct===10){emoji.textContent='🏆';text.textContent='满分！口算大王！';confettiBurst();setTimeout(confettiBurst,600);}
  else if(mState.correct>=8){emoji.textContent='🎉';text.textContent='非常棒！继续加油！';starBurst();}
  else if(mState.correct>=6){emoji.textContent='😊';text.textContent='还不错，再练练会更好！';sparkleBurst();}
  else{emoji.textContent='💪';text.textContent='别灰心，多练习就进步！';cheerBurst();}
  const prev=getLocal('mental_best');
  if(mState.correct>prev){saveLocal('mental_best',mState.correct);document.getElementById('m-best-hint').textContent='🎊 新纪录！云端已同步～';}
  else{document.getElementById('m-best-hint').textContent='历史最佳：'+prev+'/10';}
}

function drawGeoShape(problem){
  const canvas=document.getElementById('geo-canvas');
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='#F5E6F0';ctx.lineWidth=0.5;
  for(let x=0;x<w;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  const scale=problem.type==='square'?Math.min(120/problem.side,120/problem.side):Math.min(200/problem.width,120/problem.height);
  let rw,rh,rx,ry;
  if(problem.type==='square'){const s=problem.side*scale;rw=s;rh=s;rx=(w-s)/2;ry=(h-s)/2;}
  else{rw=problem.width*scale;rh=problem.height*scale;rx=(w-rw)/2;ry=(h-rh)/2;}
  ctx.fillStyle='rgba(199,125,255,0.12)';ctx.fillRect(rx+4,ry+4,rw,rh);
  const grad=ctx.createLinearGradient(rx,ry,rx+rw,ry+rh);
  grad.addColorStop(0,'#E8D5F5');grad.addColorStop(1,'#D1C4E9');
  ctx.fillStyle=grad;ctx.fillRect(rx,ry,rw,rh);
  ctx.strokeStyle='#7C4DFF';ctx.lineWidth=3;ctx.strokeRect(rx,ry,rw,rh);
  [[rx,ry],[rx+rw,ry],[rx,ry+rh],[rx+rw,ry+rh]].forEach(([cx,cy])=>{ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fillStyle='#7C4DFF';ctx.fill();});
  ctx.fillStyle='#4A3048';ctx.font='bold 16px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
  if(problem.type==='square'){ctx.fillText(problem.side+problem.unit,rx+rw/2,ry-10);ctx.save();ctx.translate(rx+rw+18,ry+rh/2);ctx.fillText(problem.side+problem.unit,0,0);ctx.restore();}
  else{ctx.fillText(problem.width+problem.unit,rx+rw/2,ry+rh+22);ctx.save();ctx.translate(rx+rw+20,ry+rh/2);ctx.fillText(problem.height+problem.unit,0,0);ctx.restore();}
  const ms=14;ctx.strokeStyle='#FF6B9D';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(rx+ms,ry);ctx.lineTo(rx+ms,ry+ms);ctx.lineTo(rx,ry+ms);ctx.stroke();
}

function nextGeoProblem(){
  document.getElementById('geo-feedback').textContent='';document.getElementById('geo-feedback').className='feedback';
  document.getElementById('geo-solution').classList.remove('show');document.getElementById('geo-solution').textContent='';
  document.getElementById('geo-next-btn').textContent='⏭ 下一题';
  const opts=document.getElementById('geo-options').children;
  for(let o of opts){o.className='option-btn';o.disabled=false;}
  const idx=Math.random()*geoProblems.length|0;const problem=geoProblems[idx];
  gState.currentAnswer=problem.answer;gState.answered=false;
  document.getElementById('geo-question-text').textContent=problem.question;
  document.getElementById('geo-question-text').classList.add('bounce-in');
  setTimeout(()=>document.getElementById('geo-question-text').classList.remove('bounce-in'),500);
  const labels=['A','B','C','D'];
  for(let i=0;i<4;i++){opts[i].textContent=labels[i]+'. '+problem.options[i];opts[i].onclick=function(){answerGeo(i,problem);};}
  drawGeoShape(problem);
}

function answerGeo(choice,problem){
  if(gState.answered)return;gState.answered=true;
  const opts=document.getElementById('geo-options').children;
  for(let o of opts)o.disabled=true;
  const fb=document.getElementById('geo-feedback'),sol=document.getElementById('geo-solution');
  if(choice===problem.answer){
    gState.correctCount++;opts[choice].classList.add('correct-choice');
    fb.textContent='✅ 答对了！几何小天才！';fb.className='feedback correct bounce-in';sparkleBurst();
  }else{
    opts[choice].classList.add('wrong-choice');opts[problem.answer].classList.add('correct-choice');
    fb.textContent='❌ 再想想看哦～';fb.className='feedback wrong bounce-in';cheerBurst();
  }
  sol.textContent='💡 '+problem.solution;sol.classList.add('show','bounce-in');
  document.getElementById('g-correct-count').textContent=gState.correctCount;
  saveLocal('geo_correct',gState.correctCount);
}
document.getElementById('geo-next-btn').addEventListener('click',nextGeoProblem);

console.log('🌟 三年级数学乐园已启动！云端数据库已连接 ✅');
</script>
